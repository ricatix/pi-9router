name: Publish to npm

# Publishes the package to npm on every pushed tag matching v*.
# Uses npm Trusted Publishing via OIDC — no NPM_TOKEN secret required.
# Configure the trusted publisher at:
#   https://www.npmjs.com/package/<name>/access  (after first manual publish)
# Trust relationship: this workflow file + this repository.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0). Leave empty to use the latest pushed tag."
        required: false

permissions:
  id-token: write   # required for npm OIDC provenance
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 24 ships with npm 11.x. Trusted Publishing OIDC requires
      # npm 11.5.1+; Node 22's npm 10.x does NOT support the OIDC handshake
      # and surfaces a misleading E404 ("package not in this registry").
      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          # NOTE: registry-url is intentionally omitted. With it set,
          # actions/setup-node writes `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
          # to .npmrc, which short-circuits the OIDC token exchange when no
          # NPM_TOKEN secret is configured (the intended state for OIDC).
          # We set the registry manually below.

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Resolve package version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == "refs/tags/"* ]]; then
            TAG="${TAG#refs/tags/}"
          fi
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.+].+)?$ ]]; then
            echo "Ref $TAG is not a semver tag; aborting." >&2
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Sync package.json version to tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          CURRENT=$(node -p "require('./package.json').version")
          if [[ "$CURRENT" != "$VERSION" ]]; then
            node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version=process.argv[1];fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');" "$VERSION"
            echo "Bumped package.json from $CURRENT to $VERSION"
          fi

      - name: Verify build artifacts exist
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts

      - name: Publish to npm
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            # Pre-release version: tag it 'next' so it doesn't replace 'latest'
            npm publish --access public --provenance --tag next
          else
            npm publish --access public --provenance
          fi
